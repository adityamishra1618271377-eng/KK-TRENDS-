<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KK Trends Store</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        header {
            background: black;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            display: flex;
            justify-content: center;
            background: #333;
        }
        nav a {
            color: white;
            padding: 10px 15px;
            text-decoration: none;
        }
        nav a:hover {
            background: #555;
        }
        .hero {
            text-align: center;
            padding: 40px;
            background: white;
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .card img {
            width: 100%;
            border-radius: 10px;
        }
        .btn {
            background: black;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
        footer {
            text-align: center;
            padding: 15px;
            background: black;
            color: white;
        }
    </style>
</head>
<body>

<header>
    <h1>KK Trends Store</h1>
    <p>Latest Fashion & Trends</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <h2>Welcome to KK Trends</h2>
    <p>Best Deals on Trending Products</p>
</section>

<section class="products">

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Product">
        <h3>T-Shirt</h3>
        <p>₹499</p>
        <button class="btn">Buy Now</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Product">
        <h3>Shoes</h3>
        <p>₹999</p>
        <button class="btn">Buy Now</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Product">
        <h3>Watch</h3>
        <p>₹799</p>
        <button class="btn">Buy Now</button>
    </div>

</section>

<footer>
    <p>Contact: 9167300600</p>
    <p>© 2026 KK Trends Store</p>
</footer>

</body>
</html>
