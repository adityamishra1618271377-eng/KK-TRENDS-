<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KK Trends Store</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    header {
      background: black;
      color: white;
      text-align: center;
      padding: 20px;
    }

    nav {
      background: #222;
      display: flex;
      justify-content: center;
    }

    nav a {
      color: white;
      padding: 12px 20px;
      text-decoration: none;
    }

    nav a:hover {
      background: #555;
    }

    .hero {
      text-align: center;
      padding: 50px;
      background: white;
    }

    .hero h1 {
      margin-bottom: 10px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .btn {
      background: black;
      color: white;
      padding: 10px;
      border: none;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
    }

    .btn:hover {
      background: #333;
    }

    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      padding: 15px;
      border-radius: 50%;
      text-decoration: none;
      font-size: 20px;
    }

    footer {
      background: black;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>KK Trends Store</h1>
  <p>Latest Fashion & Trending Products 🔥</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Products</a>
  <a href="#">Contact</a>
</nav>

<section class="hero">
  <h1>Welcome to KK Trends</h1>
  <p>Shop the Best Deals Online</p>
</section>

<section class="products">

  <div class="card">
    <img src="https://via.placeholder.com/250" alt="">
    <h3>Stylish T-Shirt</h3>
    <p>₹499</p>
    <button class="btn" onclick="order()">Order Now</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250" alt="">
    <h3>Running Shoes</h3>
    <p>₹999</p>
    <button class="btn" onclick="order()">Order Now</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250" alt="">
    <h3>Smart Watch</h3>
    <p>₹799</p>
    <button class="btn" onclick="order()">Order Now</button>
  </div>

</section>

<a class="whatsapp" href="https://wa.me/919167300600">💬</a>

<footer>
  <p>Contact: 9167300600</p>
  <p>© 2026 KK Trends Store</p>
</footer>

<script>
function order() {
  window.open("https://wa.me/919167300600?text=I want to order product");
}
</script>

</body>
</html>
