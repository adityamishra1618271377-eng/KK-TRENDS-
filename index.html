        <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KK Trends Store</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #1a1a1a;
  --accent: #ff3c00;
  --accent2: #ffaa00;
  --text: #f0ede8;
  --muted: #666;
  --border: #222;
  --success: #00c97a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

/* NAV */
nav {
  position: fixed; top: 0; width: 100%; z-index: 1000;
  background: rgba(10,10,10,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 5%;
  height: 64px;
}

.nav-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 3px;
  color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.nav-logo span { color: var(--accent); }

.nav-links { display: flex; gap: 32px; align-items: center; }
.nav-links a {
  color: var(--muted); text-decoration: none; font-size: 13px;
  font-weight: 500; letter-spacing: 1px; text-transform: uppercase;
  transition: color .2s;
}
.nav-links a:hover { color: var(--text); }

.nav-actions { display: flex; gap: 12px; align-items: center; }

.btn-icon {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .2s; font-size: 16px; position: relative;
}
.btn-icon:hover { border-color: var(--accent); color: var(--accent); }

.cart-badge {
  position: absolute; top: -6px; right: -6px;
  background: var(--accent); color: white;
  font-size: 10px; font-weight: 700;
  width: 18px; height: 18px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}

.btn-admin {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted); padding: 8px 16px; border-radius: 10px;
  font-size: 12px; font-weight: 500; letter-spacing: 1px;
  cursor: pointer; transition: all .2s; text-transform: uppercase;
}
.btn-admin:hover { border-color: var(--accent2); color: var(--accent2); }

/* HERO */
.hero {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 80px 5% 40px;
  position: relative; overflow: hidden;
}

.hero-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(255,60,0,0.08) 0%, transparent 70%);
}

.hero-grid {
  position: absolute; inset: 0; opacity: 0.03;
  background-image: linear-gradient(var(--text) 1px, transparent 1px),
    linear-gradient(90deg, var(--text) 1px, transparent 1px);
  background-size: 60px 60px;
}

.hero-content {
  text-align: center; position: relative; z-index: 2;
  max-width: 800px;
}

.hero-tag {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,60,0,0.1); border: 1px solid rgba(255,60,0,0.3);
  color: var(--accent); padding: 6px 16px; border-radius: 100px;
  font-size: 12px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 24px; animation: fadeUp 0.6s ease both;
}

.hero-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(64px, 10vw, 120px);
  line-height: 0.95;
  letter-spacing: 2px;
  animation: fadeUp 0.6s 0.1s ease both;
}

.hero-title .accent { color: var(--accent); }

.hero-sub {
  margin-top: 20px;
  color: var(--muted); font-size: 15px; line-height: 1.7;
  font-weight: 300; max-width: 500px; margin-inline: auto;
  animation: fadeUp 0.6s 0.2s ease both;
}

.hero-cta {
  margin-top: 40px; display: flex; gap: 12px;
  justify-content: center; flex-wrap: wrap;
  animation: fadeUp 0.6s 0.3s ease both;
}

.btn-primary {
  background: var(--accent); color: white;
  border: none; padding: 14px 32px; border-radius: 12px;
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  font-weight: 600; letter-spacing: 0.5px; cursor: pointer;
  transition: all .2s; text-transform: uppercase;
}
.btn-primary:hover { background: #ff5722; transform: translateY(-2px); box-shadow: 0 12px 40px rgba(255,60,0,0.3); }

.btn-outline {
  background: transparent; color: var(--text);
  border: 1px solid var(--border); padding: 14px 32px; border-radius: 12px;
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  font-weight: 500; letter-spacing: 0.5px; cursor: pointer;
  transition: all .2s; text-transform: uppercase;
}
.btn-outline:hover { border-color: var(--text); }

.hero-stats {
  margin-top: 64px;
  display: flex; gap: 48px; justify-content: center; flex-wrap: wrap;
  animation: fadeUp 0.6s 0.4s ease both;
}

.stat { text-align: center; }
.stat-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px; color: var(--text); letter-spacing: 2px;
}
.stat-num span { color: var(--accent); }
.stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-top: 4px; }

/* MARQUEE */
.marquee-wrap {
  overflow: hidden; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  padding: 14px 0; background: var(--surface);
}
.marquee-track {
  display: flex; gap: 48px; white-space: nowrap;
  animation: marquee 20s linear infinite;
}
.marquee-item {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px; letter-spacing: 4px; color: var(--muted);
  display: flex; align-items: center; gap: 16px;
}
.marquee-item span { color: var(--accent); font-size: 18px; }

@keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

/* SECTIONS */
section { padding: 80px 5%; }

.section-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 48px; flex-wrap: wrap; gap: 16px;
}

.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(36px, 5vw, 56px); letter-spacing: 2px;
}
.section-title .accent { color: var(--accent); }

.section-count { font-size: 13px; color: var(--muted); }

/* PRODUCTS GRID */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}

.product-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
  transition: all .3s; position: relative;
  cursor: pointer;
}
.product-card:hover {
  border-color: rgba(255,60,0,0.4);
  transform: translateY(-4px);
  box-shadow: 0 24px 60px rgba(0,0,0,0.4);
}

.product-img-wrap {
  aspect-ratio: 1/1; overflow: hidden;
  background: var(--surface2); position: relative;
}

.product-img-wrap img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform .4s;
}
.product-card:hover .product-img-wrap img { transform: scale(1.06); }

.product-badge {
  position: absolute; top: 12px; left: 12px;
  background: var(--accent); color: white;
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  padding: 4px 10px; border-radius: 6px; text-transform: uppercase;
}

.product-wishlist {
  position: absolute; top: 12px; right: 12px;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
  color: white; width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; cursor: pointer; border: none; transition: all .2s;
}
.product-wishlist:hover, .product-wishlist.active { background: rgba(255,60,0,0.8); }

.product-info { padding: 16px; }

.product-category {
  font-size: 11px; color: var(--accent); text-transform: uppercase;
  letter-spacing: 2px; font-weight: 500; margin-bottom: 6px;
}

.product-name {
  font-size: 15px; font-weight: 600; margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.product-desc {
  font-size: 12px; color: var(--muted); line-height: 1.5;
  margin-bottom: 12px; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

.product-footer {
  display: flex; align-items: center; justify-content: space-between;
}

.product-price {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; letter-spacing: 1px; color: var(--text);
}
.product-price span { font-size: 13px; color: var(--muted); margin-left: 2px; }

.btn-cart {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 8px 14px; border-radius: 8px;
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: all .2s; display: flex; align-items: center; gap: 6px;
}
.btn-cart:hover { background: var(--accent); border-color: var(--accent); }

/* Empty state */
.empty-state {
  grid-column: 1/-1; text-align: center; padding: 80px 20px;
  color: var(--muted);
}
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state p { font-size: 15px; }

/* CART SIDEBAR */
.cart-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 2000; opacity: 0; pointer-events: none; transition: opacity .3s;
}
.cart-overlay.open { opacity: 1; pointer-events: all; }

.cart-sidebar {
  position: fixed; right: 0; top: 0; bottom: 0;
  width: min(420px, 100vw);
  background: var(--surface); border-left: 1px solid var(--border);
  z-index: 2001; transform: translateX(100%); transition: transform .35s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column;
}
.cart-sidebar.open { transform: translateX(0); }

.cart-header {
  padding: 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.cart-header h2 {
  font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px;
}

.btn-close {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; transition: all .2s;
}
.btn-close:hover { border-color: var(--accent); color: var(--accent); }

.cart-items {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
}

.cart-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--muted); gap: 12px;
}
.cart-empty .icon { font-size: 48px; }

.cart-item {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px; display: flex; gap: 12px; align-items: center;
}
.cart-item img {
  width: 60px; height: 60px; object-fit: cover; border-radius: 8px;
  background: var(--border);
}
.cart-item-info { flex: 1; }
.cart-item-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.cart-item-price {
  font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--accent);
}
.cart-item-qty {
  display: flex; align-items: center; gap: 8px; margin-top: 6px;
}
.qty-btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); width: 24px; height: 24px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 14px; transition: all .2s;
}
.qty-btn:hover { border-color: var(--accent); color: var(--accent); }
.qty-num { font-size: 13px; font-weight: 600; min-width: 20px; text-align: center; }

.btn-remove-item {
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 14px; transition: color .2s; padding: 4px;
}
.btn-remove-item:hover { color: var(--accent); }

.cart-footer {
  padding: 20px; border-top: 1px solid var(--border);
}
.cart-total {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.cart-total-label { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.cart-total-amount {
  font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--text);
}

.btn-checkout {
  width: 100%; background: var(--accent); color: white; border: none;
  padding: 16px; border-radius: 12px; font-family: 'DM Sans', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: all .2s; text-transform: uppercase; letter-spacing: 1px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-checkout:hover { background: #ff5722; box-shadow: 0 8px 30px rgba(255,60,0,0.3); }

/* ADMIN PANEL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  z-index: 3000; display: flex; align-items: center; justify-content: center;
  padding: 20px; opacity: 0; pointer-events: none; transition: opacity .3s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; width: 100%; max-width: 500px;
  max-height: 90vh; overflow-y: auto;
  transform: scale(0.9) translateY(20px); transition: transform .3s;
}
.modal-overlay.open .modal { transform: scale(1) translateY(0); }

.modal-header {
  padding: 24px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0;
  background: var(--surface); z-index: 1;
}
.modal-header h2 {
  font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px;
}

.modal-body { padding: 24px; display: flex; flex-direction: column; gap: 20px; }

/* LOGIN */
.login-form { display: flex; flex-direction: column; gap: 16px; }

.form-group { display: flex; flex-direction: column; gap: 8px; }
.form-group label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

.form-input {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 12px 16px; border-radius: 10px;
  font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
  transition: border-color .2s;
}
.form-input:focus { border-color: var(--accent); }

/* IMAGE UPLOAD */
.img-upload-area {
  border: 2px dashed var(--border); border-radius: 12px;
  padding: 32px; text-align: center; cursor: pointer;
  transition: all .2s; position: relative;
}
.img-upload-area:hover, .img-upload-area.dragover {
  border-color: var(--accent); background: rgba(255,60,0,0.05);
}
.img-upload-area input { display: none; }
.upload-icon { font-size: 32px; margin-bottom: 8px; }
.upload-text { font-size: 13px; color: var(--muted); }
.upload-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }

.img-preview {
  width: 100%; aspect-ratio: 1/1; object-fit: cover;
  border-radius: 8px; display: none;
}

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.btn-submit {
  background: var(--accent); color: white; border: none;
  padding: 14px; border-radius: 12px; font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: all .2s; text-transform: uppercase; letter-spacing: 1px;
}
.btn-submit:hover { background: #ff5722; }
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

/* PRODUCT MANAGEMENT LIST */
.product-manage-list { display: flex; flex-direction: column; gap: 10px; }
.manage-item {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px; display: flex; gap: 12px; align-items: center;
}
.manage-item img {
  width: 50px; height: 50px; object-fit: cover; border-radius: 8px;
}
.manage-info { flex: 1; }
.manage-name { font-size: 13px; font-weight: 600; }
.manage-price { font-size: 12px; color: var(--accent); }
.btn-delete {
  background: rgba(255,60,0,0.1); border: 1px solid rgba(255,60,0,0.2);
  color: var(--accent); padding: 6px 12px; border-radius: 8px;
  font-size: 12px; cursor: pointer; transition: all .2s;
}
.btn-delete:hover { background: rgba(255,60,0,0.2); }

/* CHECKOUT MODAL */
.checkout-form { display: flex; flex-direction: column; gap: 16px; }

/* TOAST */
.toast-container {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  display: flex; flex-direction: column; gap: 8px;
}

.toast {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); padding: 12px 20px; border-radius: 12px;
  font-size: 13px; font-weight: 500; max-width: 280px;
  display: flex; align-items: center; gap: 10px;
  animation: toastIn 0.3s ease; box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}
.toast.success { border-color: var(--success); }
.toast.error { border-color: var(--accent); }

@keyframes toastIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* FOOTER */
footer {
  border-top: 1px solid var(--border); padding: 48px 5% 24px;
  background: var(--surface);
}
.footer-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 40px; margin-bottom: 40px;
}
.footer-brand .logo {
  font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px;
  margin-bottom: 12px;
}
.footer-brand .logo span { color: var(--accent); }
.footer-brand p { font-size: 13px; color: var(--muted); line-height: 1.6; }
.footer-col h4 {
  font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
  color: var(--muted); margin-bottom: 16px;
}
.footer-col a {
  display: block; font-size: 13px; color: var(--muted);
  text-decoration: none; margin-bottom: 8px; transition: color .2s;
}
.footer-col a:hover { color: var(--text); }
.footer-contact p { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
.footer-contact a { color: var(--accent); text-decoration: none; }
.footer-bottom {
  border-top: 1px solid var(--border); padding-top: 24px;
  display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.footer-bottom p { font-size: 12px; color: var(--muted); }

/* ANIMATIONS */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}

/* FILTER BAR */
.filter-bar {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px;
}
.filter-btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); padding: 8px 18px; border-radius: 100px;
  font-size: 12px; font-weight: 500; letter-spacing: 1px;
  cursor: pointer; transition: all .2s; text-transform: uppercase;
}
.filter-btn:hover, .filter-btn.active {
  background: var(--accent); border-color: var(--accent); color: white;
}

/* SEARCH BAR */
.search-wrap {
  position: relative; margin-bottom: 32px; max-width: 400px;
}
.search-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  color: var(--text); padding: 12px 16px 12px 44px; border-radius: 12px;
  font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
  transition: border-color .2s;
}
.search-input:focus { border-color: var(--accent); }
.search-icon {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  color: var(--muted); font-size: 16px;
}

/* NO PRODUCTS */
.no-products {
  text-align: center; padding: 60px; color: var(--muted);
  grid-column: 1/-1;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .nav-links { display: none; }
  .form-row { grid-template-columns: 1fr; }
}

/* ADMIN TABS */
.admin-tabs {
  display: flex; gap: 4px; background: var(--surface2);
  padding: 4px; border-radius: 10px; margin-bottom: 20px;
}
.admin-tab {
  flex: 1; padding: 8px; border: none; background: none;
  color: var(--muted); font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase; cursor: pointer; border-radius: 8px;
  transition: all .2s;
