<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KK Trends</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: linear-gradient(135deg,#667eea,#764ba2);
  color: #333;
}

header {
  text-align: center;
  padding: 20px;
  color: white;
  font-size: 24px;
  font-weight: bold;
}

.hero {
  text-align: center;
  color: white;
  padding: 30px;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 15px;
  padding: 15px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 10px;
}

.price {
  color: #ff416c;
  font-weight: bold;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(45deg,#ff416c,#ff4b2b);
  color: white;
  margin-top: 5px;
  cursor: pointer;
}

/* FORM */
#formBox {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.form {
  background:white;
  padding:20px;
  margin:8% auto;
  width:300px;
  border-radius:10px;
}

input {
  width:100%;
  padding:8px;
  margin:5px 0;
}
</style>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</head>

<body>

<header>KK Trends</header>

<div class="hero">
  <h1>🔥 Premium Collection</h1>
  <p>Shop your style</p>
</div>

<div class="container" id="products"></div>

<!-- FORM -->
<div id="formBox">
  <div class="form">
    <h3>Enter Details</h3>
    <input id="name" placeholder="Full Name">
    <input id="phone" placeholder="Phone">
    <input id="address" placeholder="Address">
    <button onclick="payNow()">Pay Now</button>
    <button onclick="whatsappOrder()">Order on WhatsApp</button>
    <button onclick="closeForm()">Cancel</button>
  </div>
</div>

<script>

// 🔥 ADD PRODUCTS MANUALLY OR FIREBASE
let products = [
  {
    name: "T-Shirt",
    price: 499,
    image: "https://via.placeholder.com/200"
  }
];

let selectedProduct, selectedPrice;

function loadProducts(){
  let html="";
  products.forEach(p=>{
    html+=`
    <div class="card">
      <img src="${p.image}">
      <h3>${p.name}</h3>
      <p class="price">₹${p.price}</p>
      <button onclick="openForm('${p.name}',${p.price})">Buy Now</button>
    </div>`;
  });
  document.getElementById("products").innerHTML=html;
}

function openForm(name,price){
  selectedProduct=name;
  selectedPrice=price;
  document.getElementById("formBox").style.display="block";
}

function closeForm(){
  document.getElementById("formBox").style.display="none";
}

// WHATSAPP
function whatsappOrder(){
  let n=document.getElementById("name").value;
  let p=document.getElementById("phone").value;
  let a=document.getElementById("address").value;

  let msg=`New Order
Product: ${selectedProduct}
Price: ₹${selectedPrice}

Name: ${n}
Phone: ${p}
Address: ${a}`;

  window.open(`https://wa.me/919136905355?text=${encodeURIComponent(msg)}`);
}

// RAZORPAY
function payNow(){

  let n=document.getElementById("name").value;
  let p=document.getElementById("phone").value;
  let a=document.getElementById("address").value;

  var options = {
    "key": "YOUR_RAZORPAY_KEY",
    "amount": selectedPrice * 100,
    "currency": "INR",
    "name": "KK Trends",

    "handler": function (){
      let msg=`PAID ORDER
Product: ${selectedProduct}
Price: ₹${selectedPrice}

Name: ${n}
Phone: ${p}
Address: ${a}`;

      window.open(`https://wa.me/919136905355?text=${encodeURIComponent(msg)}`);
      alert("Payment Successful");
    },

    "prefill": {
      "name": n,
      "contact": p
    }
  };

  var rzp=new Razorpay(options);
  rzp.open();
}

loadProducts();

</script>

</body>
</html>
