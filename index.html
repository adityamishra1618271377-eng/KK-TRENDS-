<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KK Trends</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: #f8f8f8;
}

header {
  background: black;
  color: white;
  padding: 15px;
  text-align: center;
}

.hero {
  padding: 40px;
  text-align: center;
  background: #111;
  color: white;
}

.container {
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 10px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
}

button {
  padding: 10px;
  margin-top: 5px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.buy {
  background: black;
  color: white;
}

.whatsapp {
  background: #25D366;
  color: white;
}
</style>

</head>

<body>

<header>
  <h2>KK Trends</h2>
</header>

<div class="hero">
  <h1>Style That Defines You</h1>
  <p>Shop premium products at best price</p>
</div>

<div class="container" id="products"></div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

// DISPLAY PRODUCTS
function loadProducts(){
  let html = "";
  products.forEach((p,i)=>{
    html += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>

        <button class="buy" onclick="orderNow('${p.name}', ${p.price})">Order Now</button>

      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

// WHATSAPP ORDER
function orderNow(name, price){
  let msg = `Hello, I want to order:\nProduct: ${name}\nPrice: ₹${price}`;
  let url = `https://wa.me/919136905355?text=${encodeURIComponent(msg)}`;
  window.open(url, "_blank");
}

loadProducts();

</script>

</body>
</html>
